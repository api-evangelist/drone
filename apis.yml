aid: drone
name: Drone
description: >-
  Drone is an open-source, container-native continuous integration and continuous
  delivery platform that automates software build, testing, and deployment pipelines
  entirely through Docker containers. Acquired by Harness in 2021, Drone enables
  development teams to define pipelines as code using simple YAML configuration
  files committed alongside their source code. The platform provides a comprehensive
  REST API for managing builds, repositories, secrets, cron jobs, templates, and
  user accounts in both self-hosted and cloud deployments. Drone supports multiple
  source control providers including GitHub, GitHub Enterprise, Bitbucket, and
  GitLab, and is available as a free open-source edition (Apache 2 license) or a
  paid enterprise edition for larger organizations.
