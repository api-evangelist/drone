apis:
  - aid: drone:drone-api
    name: Drone REST API
    description: >-
      The Drone REST API provides programmatic access to the Drone CI/CD platform,
      enabling management of builds, repositories, secrets, cron jobs, templates,
      and user accounts. Authentication is performed using bearer tokens retrieved
      from the Drone user interface profile page. The API supports operations across
      seven resource categories including builds (approve, create, decline, list,
      logs, promote, restart, stop), cron jobs, repositories, secrets, templates,
      individual user profile, and administrative user management.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://docs.drone.io/api/overview/
    baseURL: https://your-drone-server/api
